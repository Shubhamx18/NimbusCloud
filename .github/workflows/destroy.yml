name: Destroy AWS Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-NimbusDestroy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -input=false

      - name: Empty S3 site bucket
        run: |
          BUCKET="${{ secrets.S3_BUCKET_NAME }}"

          echo "→ Removing all current objects..."
          aws s3 rm "s3://${BUCKET}/" --recursive || true

          echo "→ Removing all versioned objects and delete markers..."
          aws s3api list-object-versions \
            --bucket "${BUCKET}" \
            --output json \
            --query '{Objects: [Versions,DeleteMarkers][][].{Key:Key,VersionId:VersionId}}' \
          | jq -c '.Objects // [] | _nwise(1000) | {Objects: ., Quiet: true}' \
          | while read -r batch; do
              aws s3api delete-objects \
                --bucket "${BUCKET}" \
                --delete "$batch" || true
            done

          echo "→ Bucket is empty."

      - name: Terraform Destroy
        working-directory: ./terraform
        run: |
          terraform destroy -input=false -auto-approve \
            -target=aws_iam_role_policy.github_actions_deploy \
            -target=aws_s3_bucket_policy.site \
            -target=aws_cloudfront_distribution.site \
            -target=aws_cloudfront_origin_access_control.site \
            -target=aws_s3_bucket_lifecycle_configuration.site \
            -target=aws_s3_bucket_public_access_block.site \
            -target=aws_s3_bucket_versioning.site \
            -target=aws_s3_bucket.site

      - name: Done
        run: |
          echo "✅ All site infrastructure destroyed."
          echo "🔒 OIDC provider + IAM role preserved."
          echo "🚀 Push any commit to main to rebuild."